<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upload Photo</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f8ff;
}

.navbar{
    background:linear-gradient(
        135deg,
        #0078D4,
        #00A4EF
    );

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 40px;

    position:sticky;
    top:0;

    z-index:1000;

    box-shadow:
    0 5px 15px rgba(0,0,0,.15);
}

.nav-links a{

    color:white;

    text-decoration:none;

    margin-left:25px;

    font-size:18px;

    font-weight:500;
}

.nav-links a:hover{

    color:#dff6ff;
}

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
}

body{
    margin:0;
    background:#f4f8ff;
}
.nav-links a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

.container{
    width:90%;
    max-width:1100px;
    margin:auto;
    padding:40px 0;
}

.upload-card{
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
    text-align:center;
}

.drop-area{

    border:3px dashed #0078D4;

    padding:40px;

    border-radius:20px;

    margin-bottom:20px;
}

.drop-area:hover{
    background:#eef7ff;
}

.upload-btn{

    background:#0078D4;

    color:white;

    border:none;

    padding:15px 30px;

    border-radius:12px;

    cursor:pointer;

    font-size:16px;
}

.upload-btn:hover{

    background:#005ea6;
}

.preview{

    margin-top:20px;
}

.preview img{

    max-width:280px;

    border-radius:15px;

    margin-top:20px;
}

.pipeline{

    margin-top:40px;

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(170px,1fr));

    gap:15px;
}

.step{

    background:#eaf4ff;

    padding:15px;

    border-radius:12px;

    text-align:center;

    transition:.5s;
}

.completed{

    background:#2ECC71;

    color:white;
}

.status{

    text-align:center;

    margin-top:25px;

    font-size:20px;

    font-weight:bold;

    color:#0078D4;
}

.success{

    color:#2ECC71;
}

</style>
</head>

<body>


<nav class="navbar">

<div class="logo">
📸 PhotoShare AI
</div>

<div class="nav-links">

<a href="index.html">Dashboard</a>

<a href="upload.html">Upload</a>

<a href="gallery.html">Gallery</a>



</div>

</nav>

<div class="container">

<div class="upload-card">

<h1>⬆ Upload Photo</h1>

<br>

<div class="drop-area">

<h2>📂 Choose an Image</h2>

<br>

<input
type="file"
id="photoInput"
accept="image/*">

</div>

<button
class="upload-btn"
onclick="processPhoto()">

Upload & Process

</button>

<div class="preview">

<img
id="previewImage"
style="display:none;">

</div>

<div class="status"
id="status">

Waiting for upload...

</div>

</div>

<div class="pipeline">

<div class="step" id="step1">
📂 Blob Storage
</div>

<div class="step" id="step2">
🚌 Service Bus
</div>

<div class="step" id="step3">
⚡ Azure Function
</div>

<div class="step" id="step4">
🖼 Thumbnail
</div>

<div class="step" id="step5">
🌐 Cosmos DB
</div>

<div class="step" id="step6">
📧 Logic App
</div>

</div>

</div>

<script>

function processPhoto(){

const file =
document.getElementById(
"photoInput"
).files[0];

if(!file){

alert("Please select a photo");

return;
}

const preview =
document.getElementById(
"previewImage"
);

preview.src =
URL.createObjectURL(file);

preview.style.display =
"block";

const reader = new FileReader();

reader.onload = async function () {

    const base64 = reader.result.split(",")[1];

    document.getElementById("status").innerHTML = "Uploading to Azure...";

    try {

        const response = await fetch("https://prod-15.centralindia.logic.azure.com:443/workflows/71dbda03dd9e4ff5868c4a65962a8d34/triggers/When_an_HTTP_request_is_received/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2FWhen_an_HTTP_request_is_received%2Frun&sv=1.0&sig=Zjoo7RS8S5li2-yrT8USBUhgBH7EfVAS-H9-VNbyr0w", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                fileName: file.name,
                imageBase64: base64
            })
        });

        if (response.ok) {

            document.getElementById("step1").classList.add("completed");
            document.getElementById("step2").classList.add("completed");
            document.getElementById("step3").classList.add("completed");
            document.getElementById("step4").classList.add("completed");
            document.getElementById("step5").classList.add("completed");
            document.getElementById("step6").classList.add("completed");

            document.getElementById("status").innerHTML =
                "✅ Photo Processed Successfully";

            document.getElementById("status").classList.add("success");

        } else {

            document.getElementById("status").innerHTML =
                "❌ Upload failed";

        }

    } catch (err) {

        console.error(err);

        document.getElementById("status").innerHTML =
            "❌ Error connecting to Logic App";
    }

};

reader.readAsDataURL(file);

let i = 0;

function runStep(){

if(i < steps.length){

document.getElementById(
"status"
).innerHTML =
steps[i].text;

document.getElementById(
steps[i].element
).classList.add(
"completed"
);

i++;

setTimeout(
runStep,
1000
);

}
else{

document.getElementById(
"status"
).innerHTML =
"✅ Photo Processed Successfully";

document.getElementById(
"status"
).classList.add(
"success"
);

}
}

runStep();

}

</script>

</body>
</html>
